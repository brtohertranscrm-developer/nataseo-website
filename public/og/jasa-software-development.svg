<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F2D"/>
      <stop offset="100%" style="stop-color:#0f2d3a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0AB5A0"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="100" r="220" fill="#0AB5A0" opacity="0.05"/>
  <circle cx="100" cy="560" r="200" fill="#B8972A" opacity="0.05"/>
  <rect x="80" y="60" width="5" height="510" rx="2" fill="url(#teal)" opacity="0.4"/>
  <!-- Logo -->
  <text x="110" y="105" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#0AB5A0" letter-spacing="2">NATASEO®</text>
  <!-- Category badge -->
  <rect x="110" y="135" width="178" height="30" rx="15" fill="#0AB5A0" opacity="0.15"/>
  <rect x="110" y="135" width="178" height="30" rx="15" fill="none" stroke="#0AB5A0" stroke-width="1" opacity="0.4"/>
  <text x="199" y="156" font-family="Arial, sans-serif" font-size="13" fill="#0AB5A0" text-anchor="middle" letter-spacing="1">SOFTWARE SOLUTION</text>
  <!-- Title -->
  <text x="110" y="270" font-family="Arial Black, sans-serif" font-size="75" font-weight="900" fill="#ffffff" letter-spacing="-1">Jasa Software</text>
  <text x="110" y="360" font-family="Arial Black, sans-serif" font-size="75" font-weight="900" fill="url(#teal)" letter-spacing="-1">Development</text>
  <!-- Divider -->
  <rect x="110" y="400" width="980" height="1" fill="#ffffff" opacity="0.08"/>
  <!-- Description -->
  <text x="110" y="445" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">Sistem custom yang benar-benar sesuai kebutuhan bisnis Anda.</text>
  <!-- URL -->
  <text x="110" y="555" font-family="Arial, sans-serif" font-size="22" fill="#0AB5A0">nataseo.asia</text>
</svg>
